config_version = "1.1"

[system]
hostname = "mypi"

[user]
name = "alice"
password = "changeme"          # plaintext by default; hashed on-device
password_encrypted = false
passwordless_sudo = false
groups = ["sudo"]              # extra groups for the UID 1000 account (append-only);
                               # 'sudo' grants the account `sudo`. Missing groups are skipped.

[ssh]
enabled = true
password_authentication = false
ssh_import_id = ["gh:alice"]
authorized_keys = [
  "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIexampleexampleexampleexample alice@laptop",
]

[wlan]
ssid = "MyNetwork"
password = "mywifipassphrase"
password_encrypted = false
hidden = false
country = "GB"
key_mgmt = "wpa-psk"   # none/owe (open), wpa-psk (WPA2), sae (WPA3); defaults by password
# Open network: just set `ssid` and omit password/key_mgmt (or key_mgmt = "none").

[ethernet]
method = "static"          # dhcp (default) | static | disabled
address = "192.168.1.50/24"
gateway = "192.168.1.1"
dns = ["192.168.1.1", "1.1.1.1"]
# interface = "eth0"        # optional; bind to a named device

[locale]
keymap = "gb"
timezone = "Europe/London"
locales = ["en_GB.UTF-8"]
lang = "en_GB.UTF-8"
lc_measurement = "en_GB.UTF-8"
keymap_model = "pc105"
keymap_options = ["ctrl:nocaps"]

[time]
ntp = ["time.cloudflare.com"]
fallback_ntp = ["0.debian.pool.ntp.org", "1.debian.pool.ntp.org"]

[ca_certificates]
# Files sit next to this config on the boot partition (or use absolute paths).
files = ["corp-root-ca.crt"]

[mounts]
# Full fstab lines: <spec> <mountpoint> <fstype> <options> <dump> <pass>
fstab = ["LABEL=DATA  /data  ext4  defaults,nofail  0  2"]

[connect]
enabled = true
mode = "device-identity"

[interfaces]
i2c = true
spi = false
serial = "console"

[boot]
config_txt = ["dtparam=audio=on"]

[packages]
update = true
install = ["vim", "htop"]
# upgrade = true          # dist-upgrade on first boot
# remove = ["nano"]

[runcmd]
early = ["systemctl enable my-service.service"]
late = ["systemctl enable --now htop.service"]
late_retries = 3
